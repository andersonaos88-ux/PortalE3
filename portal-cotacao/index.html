<!DOCTYPE html>
<!-- v2026.05.12 -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Cotação — Plano de Saúde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="rede_data.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:    #0A0A2E;
  --purple:  #4B4BDB;
  --gray-bg: #F4F4F8;
  --border:  #E0E0EC;
  --text:    #1A1A3E;
  --muted:   #6B6B8A;
  --white:   #FFFFFF;
  --danger:  #E53935;

  --bradesco:    #CC0000;
  --sulamerica:  #E8661A;
  --amil:        #3B2F9E;
  --portoseguro: #005FAF;
  --hapvida:     #00873D;
  --atual:       #2563EB;
}

body { font-family: 'Open Sans', system-ui, sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; }

/* ── HEADER ── */
.header {
  background: var(--navy); color: var(--white);
  padding: 14px 28px; display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.35);
}
.header .logo { width: 38px; height: 38px; background: var(--white); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; color: var(--navy); letter-spacing: -1px; }
.header h1 { font-size: 17px; font-weight: 700; }
.header p  { font-size: 11px; color: rgba(255,255,255,.5); }

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 430px 1fr; min-height: calc(100vh - 66px); }

/* ── SIDEBAR ── */
.sidebar { background: var(--white); border-right: 1px solid var(--border); overflow-y: auto; max-height: calc(100vh - 66px); position: sticky; top: 66px; display: flex; flex-direction: column; }
.sidebar-body { flex: 1; padding: 22px; overflow-y: auto; }
.sidebar-footer { padding: 14px 22px; border-top: 1px solid var(--border); background: var(--white); }

/* section title */
.stitle { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.4px; color: var(--purple); border-bottom: 2px solid var(--purple); padding-bottom: 6px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.stitle span { font-size: 15px; }
.fsec { margin-bottom: 26px; }

/* form elements */
.fg { margin-bottom: 12px; }
.fg label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .6px; }
.fg input, .fg select {
  width: 100%; padding: 9px 11px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 13px; color: var(--text); background: var(--white);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.fg input:focus, .fg select:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(75,75,219,.12); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* cop toggle */
.cop-toggle { display: flex; gap: 8px; }
.cop-btn {
  flex: 1; padding: 8px 6px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 12px; font-weight: 700; cursor: pointer; background: var(--white); color: var(--muted);
  transition: all .15s; text-align: center;
}
.cop-btn.active-sim { border-color: #16a34a; background: #f0fdf4; color: #15803d; }
.cop-btn.active-nao { border-color: #dc2626; background: #fef2f2; color: #b91c1c; }
.cop-btn:hover { border-color: var(--purple); }

/* insurer select */
.ins-wrap { position: relative; }
.ins-dot { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 9px; height: 9px; border-radius: 50%; pointer-events: none; }
.ins-wrap select { padding-left: 26px; }

/* plan card */
.pcard {
  background: var(--gray-bg); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 10px;
}
.pcard-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.pcard-title { font-size: 11px; font-weight: 800; color: var(--purple); text-transform: uppercase; letter-spacing: .8px; display: flex; align-items: center; gap: 6px; }
.pnum { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: var(--white); }
.rm-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 5px; border-radius: 4px; line-height: 1; transition: all .15s; }
.rm-btn:hover { background: #fee2e2; color: var(--danger); }

/* add plan */
.add-btn {
  width: 100%; padding: 10px; border: 2px dashed var(--border);
  border-radius: 10px; background: none; cursor: pointer;
  color: var(--purple); font-size: 13px; font-weight: 700;
  transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.add-btn:hover:not(:disabled) { border-color: var(--purple); background: #f0f0ff; }
.add-btn:disabled { opacity: .4; cursor: not-allowed; }

/* footer button */
.gen-btn {
  width: 100%; padding: 13px; background: var(--purple); color: var(--white);
  border: none; border-radius: 10px; font-size: 14px; font-weight: 800;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .2s;
}
.gen-btn:hover { background: var(--navy); box-shadow: 0 4px 18px rgba(75,75,219,.3); }

/* ── PREVIEW AREA ── */
.preview { padding: 28px 24px; overflow-y: auto; background: #DDDDE8; display: flex; flex-direction: column; align-items: center; gap: 20px; }

.preview-bar {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  background: var(--white); border-radius: 10px; padding: 10px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.preview-bar span { font-size: 12px; font-weight: 600; color: var(--muted); }
.pdf-btn {
  padding: 8px 18px; background: var(--navy); color: var(--white); border: none;
  border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: background .15s;
}
.pdf-btn:hover { background: var(--purple); }
.pdf-btn:disabled { opacity: .6; cursor: not-allowed; }

.slides-wrap { display: flex; flex-direction: column; gap: 20px; align-items: center; }
.slide-box { box-shadow: 0 6px 28px rgba(0,0,0,.2); border-radius: 8px; overflow: hidden; }

/* empty */
.empty { min-height: 360px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 10px; }
.empty .icon { font-size: 44px; opacity: .35; }
.empty p { font-size: 13px; }

/* ═══════════════════════════════
   SLIDE 1 — COVER
═══════════════════════════════ */
.s-cover {
  width: 960px; height: 540px;
  background: url('bg-capa.png') center center / cover no-repeat;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 36px 56px 52px;
}
/* logo fixo no topo */
.s-cover .cover-logo { z-index: 2; }
.s-cover .cover-logo img { height: 36px; max-width: 160px; object-fit: contain; display: block; }
/* bloco de texto no fundo-esquerda */
.s-cover .cover-body {
  display: flex; flex-direction: column;
  z-index: 2; width: 52%;
}
.s-cover .cover-tag {
  font-family: 'Open Sans',sans-serif;
  font-size: 13px; font-weight: 400;
  color: rgba(255,255,255,.7);
  margin-bottom: 10px;
}
.s-cover .cover-company {
  font-family: 'Industry','Industry Book',sans-serif;
  font-size: 36px; font-weight: 700;
  color: #fff; text-transform: uppercase;
  line-height: 1.15; letter-spacing: .5px;
  margin-bottom: 18px;
}
.s-cover .cover-line {
  width: 72px; height: 2px;
  background: rgba(255,255,255,.4);
  margin-bottom: 14px;
}
.s-cover .cover-date {
  font-family: 'Open Sans',sans-serif;
  font-size: 12px; color: rgba(255,255,255,.55);
}

/* ═══════════════════════════════
   SLIDE 3 — BACK COVER
═══════════════════════════════ */
.s-back {
  width: 960px; height: 540px;
  background: url('bg-contracapa.png') center center / cover no-repeat;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.s-back .back-left {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column;
  align-items: flex-start; z-index: 2;
  width: 46%;
}
.s-back .back-tagline {
  font-family: 'Industry','Industry Book',sans-serif;
  font-size: 30px; font-weight: 400;
  color: rgba(255,255,255,.9);
  margin-bottom: 20px; letter-spacing: .3px;
}
.s-back .back-sub {
  font-family: 'Open Sans',sans-serif;
  font-size: 11px; font-weight: 700;
  color: rgba(255,255,255,.5);
  letter-spacing: 2.5px; text-transform: uppercase;
}

/* ═══════════════════════════════
   SLIDE 2 — COMPARISON
═══════════════════════════════ */
.s-comp {
  width: 960px; min-height: 540px;
  background: var(--white);
  padding: 36px 44px 28px;
  position: relative;
}
.s-comp .s-title { text-align: center; font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 28px; }
.s-comp .s-title em { font-style: normal; font-weight: 400; color: var(--muted); }

.comp-grid { display: flex; gap: 0; align-items: stretch; }
.comp-col { display: flex; flex-direction: column; }
.comp-col.atual { width: 200px; flex-shrink: 0; }
.comp-col.study { flex: 1; }

.col-label { text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text); margin-bottom: 10px; }

.ins-tag {
  display: inline-block; padding: 4px 14px; border-radius: 20px;
  border: 1.5px solid; font-size: 11px; font-weight: 700; margin-bottom: 4px;
}

.chart-wrap { height: 260px; position: relative; }
canvas { display: block; }

.plan-meta { display: flex; flex-direction: column; align-items: center; margin-top: 5px; gap: 2px; }
.plan-name-label { font-size: 10px; font-weight: 700; }
.cop-chip {
  font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .4px;
}
.cop-chip.sim { background: #dcfce7; color: #15803d; }
.cop-chip.nao { background: #fee2e2; color: #b91c1c; }
.vidas-chip { font-size: 9px; color: var(--muted); }
/* reajuste toggle */
.reaj-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  background: #eff6ff; border: 1.5px solid #3b82f6;
  cursor: pointer; margin-top: 8px;
}
.reaj-toggle input { accent-color: #2563eb; width: 15px; height: 15px; cursor: pointer; }
.reaj-toggle label { font-size: 11px; font-weight: 700; color: #1d4ed8; cursor: pointer; line-height: 1.3; }
.reaj-fields { margin-top: 8px; padding: 10px; background: #eff6ff; border-radius: 8px; border: 1.5px solid #bfdbfe; }
.reaj-chip {
  font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  background: #eff6ff; color: #1d4ed8; letter-spacing: .3px;
}

/* cop slide toggle */
.rede-reg-lbl {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 600; color: var(--text);
  cursor: pointer; padding: 5px 9px;
  border-radius: 6px; border: 1.5px solid var(--border);
  background: var(--white); transition: border-color .15s, background .15s;
}
.rede-reg-lbl:hover { border-color: var(--purple); background: #f0f0ff; }
.rede-reg-lbl input { accent-color: var(--purple); width: 14px; height: 14px; cursor: pointer; }

.cop-slide-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  background: #f0fdf4; border: 1.5px solid #16a34a;
  cursor: pointer; margin-top: 8px;
}
.cop-slide-toggle input { accent-color: #16a34a; width: 15px; height: 15px; cursor: pointer; }
.cop-slide-toggle label { font-size: 11px; font-weight: 700; color: #15803d; cursor: pointer; line-height: 1.3; }

.reembolso-chip {
  font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  background: #eff6ff; color: #1d4ed8; letter-spacing: .3px;
}

/* ganho anual */
.ganho-chip {
  font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px;
  letter-spacing: .3px; margin-top: 3px; white-space: nowrap;
}
.ganho-chip.positivo { background: #dcfce7; color: #15803d; }
.ganho-chip.negativo { background: #fee2e2; color: #b91c1c; }
.ganho-chip.neutro   { background: #f1f5f9; color: var(--muted); }
.ganho-label { font-size: 8px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-top: 1px; }

/* study plans grid — each row aligns across all plan columns */
.study-plans-grid { display: grid; text-align: center; gap: 3px 0; }
.study-plans-grid > * { display: flex; align-items: center; justify-content: center; }

/* reembolso removed, just empty for alignment */
.divider { height: 3px; background: linear-gradient(90deg, var(--purple), #818cf8); border-radius: 2px; margin: 20px 0 12px; }
.legend-row { display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); font-weight: 700; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; }

/* ── Separator between atual and study ── */
.vert-sep { width: 1px; background: var(--border); margin: 0 20px; }

/* ══════════════════════════════════════
   RESPONSIVO — MOBILE (≤ 767px)
   Desktop permanece 100% inalterado
══════════════════════════════════════ */
@media (max-width: 767px) {

  /* Layout: empilha sidebar + preview */
  .layout {
    grid-template-columns: 1fr;
    min-height: auto;
  }

  /* Sidebar: deixa de ser sticky e usa altura natural */
  .sidebar {
    position: static;
    max-height: none;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }

  /* Preview: menos padding lateral */
  .preview {
    padding: 16px 10px;
    gap: 14px;
  }

  /* Header: oculta subtítulo de seguradoras */
  .header p { display: none; }
  .header h1 { font-size: 15px; }

  /* Formulário: colunas colapsam em 1 */
  .row2 { grid-template-columns: 1fr; }
  .row3 { grid-template-columns: 1fr 1fr 1fr; } /* mantém 3 cols (vidas + valor) */

  /* Botão gerar PDF na barra de preview */
  .preview-bar {
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 14px;
  }
  .pdf-btn { width: 100%; justify-content: center; }
}

</style>
</head>
<body>

<header class="header">
  <div class="logo">E3</div>
  <div>
    <h1>Portal de Cotação — Plano de Saúde</h1>
    <p>Bradesco · SulAmérica · Amil · Porto Seguro · Hapvida</p>
  </div>
</header>

<div class="layout">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-body">

      <!-- Dados do cliente -->
      <div class="fsec">
        <div class="stitle"><span>🏢</span> Dados do Cliente</div>
        <div class="fg">
          <label>Nome da empresa / cliente</label>
          <input id="empresa" type="text" placeholder="Ex: Empresa ABC Ltda" oninput="render()">
        </div>
        <div class="row2">
          <div class="fg">
            <label>Mês / Ano</label>
            <input id="mesano" type="month" oninput="render()">
          </div>
          <div class="fg">
            <label>Consultor</label>
            <input id="consultor" type="text" placeholder="Seu nome" oninput="render()">
          </div>
        </div>
      </div>

      <!-- Plano atual -->
      <div class="fsec">
        <div class="stitle"><span>📋</span> Plano Atual</div>
        <div class="reaj-toggle" onclick="toggleShowAtual()" style="margin-bottom:14px">
          <input type="checkbox" id="opt-show-atual" checked onclick="event.stopPropagation();toggleShowAtual()">
          <label for="opt-show-atual">Incluir plano atual na apresentação</label>
        </div>
        <div id="atual-fields-wrap">
        <div class="row2">
          <div class="fg">
            <label>Seguradora</label>
            <div class="ins-wrap">
              <div class="ins-dot" id="dot-atual" style="background:var(--atual)"></div>
              <select id="a-seg" onchange="syncDot('atual','a-seg'); syncAtualPlanOpts(); autoFillAtualReembolso(); render()">
                <option value="bradesco">Bradesco</option>
                <option value="sulamerica">SulAmérica</option>
                <option value="amil">Amil</option>
                <option value="portoseguro">Porto Seguro</option>
                <option value="hapvida">Hapvida</option>
                <option value="outro">Outro</option>
              </select>
            </div>
          </div>
          <div class="fg">
            <label>Nome do Plano</label>
            <select id="a-plano" onchange="autoFillAtualReembolso(); render()"></select>
          </div>
        </div>
        <div class="row2">
          <div class="fg">
            <label>Nº de Vidas</label>
            <input id="a-vidas" type="number" min="1" value="3" oninput="render()">
          </div>
          <div class="fg">
            <label>Valor Mensal (R$)</label>
            <input id="a-valor" type="number" min="0" step="0.01" placeholder="4140.00" oninput="render()">
          </div>
        </div>
        <div class="fg">
          <label>Coparticipação</label>
          <div class="cop-toggle">
            <button class="cop-btn" id="cop-a-sim" onclick="setCop('a',true)">✔ Com Coparticipação</button>
            <button class="cop-btn active-nao" id="cop-a-nao" onclick="setCop('a',false)">✕ Sem Coparticipação</button>
          </div>
        </div>
        <div class="reaj-toggle" onclick="toggleAtualReembShow()">
          <input type="checkbox" id="rs-atual" onclick="event.stopPropagation(); toggleAtualReembShow()">
          <label for="rs-atual">Exibir reembolso por consulta no documento</label>
        </div>
        <div id="a-reembolso-container" style="display:none"></div>
        </div><!-- /atual-fields-wrap -->
      </div>

      <!-- Planos cotados -->
      <div class="fsec">
        <div class="stitle"><span>🔍</span> Planos Cotados</div>
        <div id="plans-list"></div>
        <button class="add-btn" id="add-btn" onclick="addPlan()">＋ Adicionar plano</button>
      </div>

      <!-- Comparativo de Rede -->
      <div class="fsec">
        <div class="stitle"><span>🏥</span> Rede Credenciada</div>
        <div class="reaj-toggle" onclick="toggleRedeComp()" style="margin-bottom:10px">
          <input type="checkbox" id="opt-rede-comp" onclick="event.stopPropagation();toggleRedeComp()">
          <label for="opt-rede-comp">Incluir comparativo de rede credenciada</label>
        </div>
        <div id="rede-comp-fields" style="display:none">
          <div class="fg">
            <label>Regiões (múltipla escolha)</label>
            <div id="rede-regioes-list" style="display:flex;flex-direction:column;gap:4px;margin-top:4px">
              <label class="rede-reg-lbl"><input type="checkbox" value="ABCD" onchange="render()"> ABCD</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="Alto Tietê" onchange="render()"> Alto Tietê</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="Baixada Santista" onchange="render()"> Baixada Santista</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="Campinas e Região" onchange="render()"> Campinas e Região</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="Grande SP" onchange="render()"> Grande SP</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="Interior" onchange="render()"> Interior</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="Sorocaba e Região" onchange="render()"> Sorocaba e Região</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="São Paulo - Centro" onchange="render()"> São Paulo - Centro</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="São Paulo - Zona Leste" onchange="render()"> São Paulo - Zona Leste</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="São Paulo - Zona Norte" onchange="render()"> São Paulo - Zona Norte</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="São Paulo - Zona Oeste" onchange="render()"> São Paulo - Zona Oeste</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="São Paulo - Zona Sul" onchange="render()"> São Paulo - Zona Sul</label>
              <label class="rede-reg-lbl"><input type="checkbox" value="Vale do Paraíba" onchange="render()"> Vale do Paraíba</label>
            </div>
          </div>
          <div style="font-size:10px;color:#6B6B8A;padding:4px 0">Um slide por região · Colunas dos planos cotados.</div>
        </div>
      </div>

    </div>
    <div class="sidebar-footer">
      <button class="gen-btn" onclick="render()">🔄 Atualizar Preview</button>
    </div>
  </aside>

  <!-- ══ PREVIEW ══ -->
  <main class="preview">
    <div class="preview-bar">
      <span>📄 Preview do documento</span>
      <button class="pdf-btn" id="pdf-btn" onclick="gerarPDF()">⬇ Baixar PDF</button>

let plans = [];
let copMap = { a: false };
let copSlideMap = {};   // id → true/false: incluir slide de cop
let copTypeMap  = {};  // id → 'parcial' | 'completo' (Amil e Hapvida)
let reajMap = {};      // id → true/false: mostrar reajuste
let reembShowMap = {}; // id → true/false: exibir reembolso no slide
let atualReembShow = false;
let showAtual = true;
let showRedeComp = false;
let counter = 0;
let charts = [];
let renderGen = 0;

/* ═══════════════════ INIT ═══════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('mesano').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  syncAtualPlanOpts();
  addPlan();
  render();

  // Pré-preenche o campo Corretor/Consultor com o nome do usuário logado
  const ctNome = document.cookie.match(/(?:^|;\s*)ct_nome=([^;]+)/);
  if (ctNome) {
    const el = document.getElementById('consultor');
    if (el && !el.value) { el.value = decodeURIComponent(ctNome[1]); render(); }
  }
});


/* ═══════════════════ TOGGLE REDE COMP ═══════════════════ */
function toggleRedeComp() {
  showRedeComp = !showRedeComp;
  const cb = document.getElementById('opt-rede-comp');
  if (cb) cb.checked = showRedeComp;
  const fields = document.getElementById('rede-comp-fields');
  if (fields) fields.style.display = showRedeComp ? '' : 'none';
  render();
}

function getRedeRegioesSelecionadas() {
  return [...document.querySelectorAll('#rede-regioes-list input[type=checkbox]:checked')].map(el => el.value);
}

function redeSlideId(regiao) {
  return 'sl-rede-' + regiao.replace(/\s+/g,'-').replace(/[^\w-]/g,'');
}

/* ═══════════════════ TOGGLE PLANO ATUAL ═══════════════════ */
function toggleShowAtual() {
  showAtual = !showAtual;
  document.getElementById('opt-show-atual').checked = showAtual;
  const wrap = document.getElementById('atual-fields-wrap');
  if (wrap) wrap.style.opacity = showAtual ? '1' : '0.4';
  render();
}

/* ═══════════════════ COP TOGGLE ═══════════════════ */
function setCop(id, val) {
  copMap[id] = val;
  // For plan cards, rebuild to show/hide cop slide checkbox
  if (id !== 'a') {
    renderPlanCards();
  } else {
    const sim = document.getElementById(`cop-${id}-sim`);
    const nao = document.getElementById(`cop-${id}-nao`);
    if (sim) sim.className = 'cop-btn' + (val ? ' active-sim' : '');
    if (nao) nao.className = 'cop-btn' + (!val ? ' active-nao' : '');
  }
  render();
}

/* ═══════════════════ INSURER DOT ═══════════════════ */
function syncDot(dotId, selId) {
  const sel = document.getElementById(selId);
  const dot = document.getElementById('dot-' + dotId);
  if (sel && dot) dot.style.background = (INS[sel.value] || INS.outro).color;
}

/* ═══════════════════ PLANS ═══════════════════ */
function addPlan() {
  if (plans.length >= 4) return;
  const id = ++counter;
  plans.push(id);
  copMap['p' + id] = false;
  copSlideMap[id] = false;
  copTypeMap[id] = null;
  reajMap[id] = false;
  reembShowMap[id] = false;
  renderPlanCards();
  updateAddBtn();
  render();
}

function removePlan(id) {
  plans = plans.filter(x => x !== id);
  delete copMap['p' + id];
  delete copSlideMap[id];
  delete copTypeMap[id];
  delete reajMap[id];
  delete reembShowMap[id];
  renderPlanCards();
  updateAddBtn();
  render();
}

function syncPlanOpts(id) {
  const seg   = document.getElementById(`p${id}-seg`)?.value || 'bradesco';
  const sel   = document.getElementById(`p${id}-plano`);
  if (!sel) return;
  const opts  = PLANS[seg] || [];
  const prev  = sel.value;
  sel.innerHTML = opts.length
    ? opts.map(p => `<option value="${p}"${p===prev?' selected':''}>${p}</option>`).join('')
    : '<option value="">—</option>';
}

function syncAtualPlanOpts() {
  const seg  = document.getElementById('a-seg')?.value || 'bradesco';
  const sel  = document.getElementById('a-plano');
  if (!sel) return;
  const opts = PLANS[seg] || [];
  const prev = sel.value;
  sel.innerHTML = opts.length
    ? opts.map(p => `<option value="${p}"${p===prev?' selected':''}>${p}</option>`).join('')
    : '<option value="">—</option>';
}

function toggleCopSlide(id) {
  copSlideMap[id] = !copSlideMap[id];
  render();
}

function toggleReaj(id) {
  reajMap[id] = !reajMap[id];
  renderPlanCards();
  if (reajMap[id]) autoFillReaj(id);
  render();
}

function autoFillReaj(id) {
  const seg = document.getElementById(`p${id}-seg`)?.value;
  const data = REAJUSTE_DATA[seg];
  if (!data) return;
  const reaj5  = document.getElementById(`p${id}-reaj5`);
  const reajat = document.getElementById(`p${id}-reajat`);
  if (reaj5  && !reaj5.value)  reaj5.value  = data.media5;
  if (reajat && !reajat.value) reajat.value = data.vigente;
}

function toggleReembShow(id) {
  reembShowMap[id] = !reembShowMap[id];
  renderPlanCards();
  render();
}

function autoFillReembolso(id) {
  const seg   = document.getElementById(`p${id}-seg`)?.value;
  const plano = document.getElementById(`p${id}-plano`)?.value;
  const val   = REEMBOLSO_DATA[seg]?.[plano];
  const input = document.getElementById(`p${id}-reembolso`);
  if (!input) return;
  if (Array.isArray(val)) {
    input.value = '';
  } else if (val) {
    input.value = val.toFixed(2);
  } else {
    input.value = '';
  }
  renderPlanCards();
  render();
}

function toggleAtualReembShow() {
  atualReembShow = !atualReembShow;
  const cb = document.getElementById('rs-atual');
  if (cb) cb.checked = atualReembShow;
  const container = document.getElementById('a-reembolso-container');
  if (container) container.style.display = atualReembShow ? '' : 'none';
  if (atualReembShow) autoFillAtualReembolso();
  render();
}

function autoFillAtualReembolso() {
  const seg      = document.getElementById('a-seg')?.value;
  const plano    = document.getElementById('a-plano')?.value;
  const val      = REEMBOLSO_DATA[seg]?.[plano];
  const container = document.getElementById('a-reembolso-container');
  if (!container || !atualReembShow) return;
  const sel = `style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px"`;
  if (Array.isArray(val)) {
    const opts = val.map(v => `<option value="${v}">R$ ${v.toFixed(2).replace('.',',')}</option>`).join('');
    container.innerHTML = `<div class="fg"><label>Reembolso por consulta (R$)</label><select id="a-reembolso" onchange="render()" ${sel}><option value="">Selecionar opção...</option>${opts}</select></div>`;
  } else if (val) {
    container.innerHTML = `<div class="fg"><label>Reembolso por consulta (R$)</label><input id="a-reembolso" type="number" min="0" step="0.01" value="${val.toFixed(2)}" readonly style="background:var(--sidebar);color:var(--muted);cursor:default" oninput="render()"></div>`;
  } else {
    container.innerHTML = `<div class="fg"><label>Reembolso por consulta (R$)</label><input id="a-reembolso" type="number" min="0" step="0.01" placeholder="Ex: 300.00" oninput="render()"></div>`;
  }
  render();
}

function setCopType(id, type) {
  copTypeMap[id] = type;
  renderPlanCards();
  render();
}

function updateAddBtn() {
  document.getElementById('add-btn').disabled = plans.length >= 4;
}

function renderPlanCards() {
  // Save existing input values before rebuilding DOM
  const saved = {};
  plans.forEach(id => {
    saved[id] = {
      seg:       document.getElementById(`p${id}-seg`)?.value,
      plano:     document.getElementById(`p${id}-plano`)?.value,
      vidas:     document.getElementById(`p${id}-vidas`)?.value,
      valor:     document.getElementById(`p${id}-valor`)?.value,
      reembolso: document.getElementById(`p${id}-reembolso`)?.value,
      copSlide:  copSlideMap[id],
      copType:   copTypeMap[id],
      reaj:      reajMap[id],
      reembShow: reembShowMap[id],
      reaj5:     document.getElementById(`p${id}-reaj5`)?.value,
      reajat:    document.getElementById(`p${id}-reajat`)?.value,
    };
  });

  const opts = INS_OPTIONS.map(k => `<option value="${k}">${INS[k].label}</option>`).join('');
  document.getElementById('plans-list').innerHTML = plans.map((id, i) => {
    const col = PLAN_COLORS[i];
    const cop = copMap['p' + id] || false;
    return `
    <div class="pcard" id="pcard-${id}">
      <div class="pcard-header">
        <div class="pcard-title">
          <div class="pnum" style="background:${col}">${i+1}</div>
          Plano ${i+1}
        </div>
        <button class="rm-btn" onclick="removePlan(${id})">✕</button>
      </div>
      <div class="row2">
        <div class="fg">
          <label>Seguradora</label>
          <div class="ins-wrap">
            <div class="ins-dot" id="dot-p${id}" style="background:${col}"></div>
            <select id="p${id}-seg" onchange="syncDot('p${id}','p${id}-seg'); syncPlanOpts(${id}); renderPlanCards(); render()">${opts}</select>
          </div>
        </div>
        <div class="fg">
          <label>Nome do Plano</label>
          <select id="p${id}-plano" onchange="autoFillReembolso(${id}); render()">
            ${(PLANS[saved[id]?.seg || 'bradesco'] || []).map(p => `<option value="${p}">${p}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="row3">
        <div class="fg">
          <label>Nº de Vidas</label>
          <input id="p${id}-vidas" type="number" min="1" value="3" oninput="render()">
        </div>
        <div class="fg" style="grid-column: span 2">
          <label>Valor da Cotação (R$)</label>
          <input id="p${id}-valor" type="number" min="0" step="0.01" placeholder="4266.89" oninput="render()">
        </div>
      </div>
      <div class="fg">
        <label>Coparticipação</label>
        <div class="cop-toggle">
          <button class="cop-btn${cop?' active-sim':''}" id="cop-p${id}-sim" onclick="setCop('p${id}',true)">✔ Com Coparticipação</button>
          <button class="cop-btn${!cop?' active-nao':''}" id="cop-p${id}-nao" onclick="setCop('p${id}',false)">✕ Sem Coparticipação</button>
        </div>
      </div>
      ${cop && ['amil','hapvida'].includes(saved[id]?.seg || 'bradesco') ? `
      <div class="fg">
        <label>Tipo de Coparticipação ${(saved[id]?.seg||'') === 'hapvida' ? 'Hapvida' : 'Amil'}</label>
        <div class="cop-toggle">
          <button class="cop-btn${copTypeMap[id]==='parcial'?' active-sim':''}" onclick="setCopType(${id},'parcial')">Parcial</button>
          <button class="cop-btn${copTypeMap[id]==='completo'?' active-sim':''}" onclick="setCopType(${id},'completo')">Completo</button>
        </div>
      </div>
      ` : ''}
      ${cop ? `
      <div class="cop-slide-toggle" onclick="toggleCopSlide(${id})">
        <input type="checkbox" id="cs-${id}" ${copSlideMap[id] ? 'checked' : ''} onclick="event.stopPropagation(); toggleCopSlide(${id})">
        <label for="cs-${id}">Inserir slide de exemplos de coparticipação desta seguradora</label>
      </div>` : ''}
      <div class="reaj-toggle" onclick="toggleReembShow(${id})">
        <input type="checkbox" id="rs-${id}" ${reembShowMap[id] ? 'checked' : ''} onclick="event.stopPropagation(); toggleReembShow(${id})">
        <label for="rs-${id}">Exibir reembolso por consulta no documento</label>
      </div>
      ${reembShowMap[id] ? (() => {
        const reembVal = REEMBOLSO_DATA[saved[id]?.seg]?.[saved[id]?.plano];
        const savedVal = parseFloat(saved[id]?.reembolso) || 0;
        if (Array.isArray(reembVal)) {
          const opts = reembVal.map(v => `<option value="${v}" ${Math.abs(v - savedVal) < 0.01 && savedVal > 0 ? 'selected' : ''}>R$ ${v.toFixed(2).replace('.',',')}</option>`).join('');
          return `<div class="fg"><label>Reembolso por consulta (R$)</label><select id="p${id}-reembolso" onchange="render()" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px"><option value="">Selecionar opção...</option>${opts}</select></div>`;
        } else {
          const fixedVal = reembVal ? reembVal.toFixed(2) : (savedVal || '');
          const ro = reembVal ? 'readonly style="background:var(--sidebar);color:var(--muted);cursor:default"' : '';
          return `<div class="fg"><label>Reembolso por consulta (R$)</label><input id="p${id}-reembolso" type="number" min="0" step="0.01" value="${fixedVal}" placeholder="Ex: 300.00" ${ro} oninput="render()"></div>`;
        }
      })() : `<input type="hidden" id="p${id}-reembolso" value="${saved[id]?.reembolso || ''}">`}
      <div class="reaj-toggle" onclick="toggleReaj(${id})">
        <input type="checkbox" id="rj-${id}" ${reajMap[id] ? 'checked' : ''} onclick="event.stopPropagation(); toggleReaj(${id})">
        <label for="rj-${id}">Informar reajuste anual</label>
      </div>
      ${reajMap[id] ? `
      <div class="reaj-fields">
        <div class="row2">
          <div class="fg" style="margin-bottom:0">
            <label>Reajuste médio 5 anos (%)</label>
            <input id="p${id}-reaj5" type="number" min="0" step="0.1" placeholder="Ex: 14.5" oninput="render()">
          </div>
          <div class="fg" style="margin-bottom:0">
            <label>Reajuste atual (%)</label>
            <input id="p${id}-reajat" type="number" min="0" step="0.1" placeholder="Ex: 18.2" oninput="render()">
          </div>
        </div>
        <div style="font-size:10px;color:#6B6B8A;margin-top:6px">Ciclo: Mai/2026 — Abr/2027 · Fonte: operadoras</div>
      </div>` : ''}
    </div>`;
  }).join('');

  // Restore values (DOM was just rebuilt)
  plans.forEach(id => {
    const s = saved[id];
    if (!s) return;
    const seg = document.getElementById(`p${id}-seg`);
    const plano = document.getElementById(`p${id}-plano`);
    const vidas = document.getElementById(`p${id}-vidas`);
    const valor = document.getElementById(`p${id}-valor`);
    if (seg   && s.seg)   { seg.value   = s.seg;   syncDot(`p${id}`, `p${id}-seg`); }
    if (plano && s.plano) plano.value = s.plano;
    if (vidas && s.vidas) vidas.value = s.vidas;
    if (valor && s.valor) valor.value = s.valor;
    const reembolso = document.getElementById(`p${id}-reembolso`);
    if (reembolso && s.reembolso) reembolso.value = s.reembolso;
    if (s.copSlide  !== undefined) copSlideMap[id]  = s.copSlide;
    if (s.copType   !== undefined) copTypeMap[id]   = s.copType;
    if (s.reaj      !== undefined) reajMap[id]      = s.reaj;
    if (s.reembShow !== undefined) reembShowMap[id] = s.reembShow;
    const reaj5  = document.getElementById(`p${id}-reaj5`);
    const reajat = document.getElementById(`p${id}-reajat`);
    if (reaj5  && s.reaj5)  reaj5.value  = s.reaj5;
    if (reajat && s.reajat) reajat.value = s.reajat;
  });
}

/* ═══════════════════ COLLECT DATA ═══════════════════ */
function getData() {
  const mv = document.getElementById('mesano').value;
  let label = '';
  if (mv) {
    const [y, m] = mv.split('-');
    const M = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    label = `${M[+m-1]}/${y}`;
  }
  return {
    empresa:   document.getElementById('empresa').value.trim() || 'Nome da Empresa',
    mesano:    label || 'Mês/Ano',
    consultor: document.getElementById('consultor').value.trim(),
    showAtual,
    atual: {
      seg:   document.getElementById('a-seg').value,
      plano: document.getElementById('a-plano').value.trim() || '—',
      vidas: parseInt(document.getElementById('a-vidas').value) || 1,
      valor: parseFloat(document.getElementById('a-valor').value) || 0,
      cop:      copMap['a'] || false,
      reembolso: atualReembShow ? (parseFloat(document.getElementById('a-reembolso')?.value) || 0) : 0,
    },
    plans: plans.map((id,i) => {
      const seg = document.getElementById(`p${id}-seg`)?.value || 'outro';
      return {
        id,
        color: (INS[seg] || INS.outro).color,
        seg,
        plano: document.getElementById(`p${id}-plano`)?.value.trim() || '—',
        vidas: parseInt(document.getElementById(`p${id}-vidas`)?.value) || 1,
        valor: parseFloat(document.getElementById(`p${id}-valor`)?.value) || 0,
        cop:      copMap['p'+id] || false,
        copType:  copTypeMap[id] || null,
        reembolso: reembShowMap[id] ? (parseFloat(document.getElementById(`p${id}-reembolso`)?.value) || 0) : 0,
        reaj:     reajMap[id] || false,
        reaj5:    parseFloat(document.getElementById(`p${id}-reaj5`)?.value) || 0,
        reajat:   parseFloat(document.getElementById(`p${id}-reajat`)?.value) || 0,
      };
    }),
  };
}

/* ═══════════════════ RENDER ═══════════════════ */
function render() {
  charts.forEach(c => { try { c.destroy(); } catch(_){} });
  charts = [];

  const d = getData();
  const wrap = document.getElementById('doc-wrap');
  // Group cop slides by insurer (one slide per insurer with all selected plans)
  const copByKey = {};
  d.plans.filter(p => p.cop && copSlideMap[p.id]).forEach(p => {
    const key = ['amil','hapvida'].includes(p.seg) ? `${p.seg}-${p.copType || 'completo'}` : p.seg;
    if (!copByKey[key]) copByKey[key] = { seg: p.seg, copType: p.copType || null, planos: [] };
    if (!copByKey[key].planos.includes(p.plano)) copByKey[key].planos.push(p.plano);
  });
  const copSlides = Object.values(copByKey)
    .map(info => buildCopSlide(info.seg, info.planos, info.copType))
    .join('');
  const redeSlides = showRedeComp ? getRedeRegioesSelecionadas().map(r => buildRedeComp(r)).join('') : '';
  wrap.innerHTML = buildCover(d) + buildComp(d) + copSlides + redeSlides + buildBackCover();

  applyZoom();
  const gen = ++renderGen;
  setTimeout(() => { if (gen === renderGen) drawCharts(d); }, 60);
}

function applyZoom() {
  const area = document.querySelector('.preview');
  if (!area) return;
  const st = getComputedStyle(area);
  const hPad = parseFloat(st.paddingLeft) + parseFloat(st.paddingRight);
  const avail = area.clientWidth - hPad;
  const z = Math.min(1, avail / 960);
  document.querySelectorAll('.slide-box').forEach(el => el.style.zoom = z);
}
window.addEventListener('resize', applyZoom);

/* ═══════════════════ SLIDE — REDE COMP ═══════════════════ */
function buildRedeComp(regiao) {
  regiao = regiao || 'ABCD';
  const d = getData();

  // Montar colunas a partir dos planos cotados (atual + estudo)
  const cols = [];
  const addCol = (seg, plano, color) => {
    if (!REDE_DATA || !REDE_DATA[seg]) return;
    const tsvNome = (PLAN_REDE_MAP[seg] || {})[plano];
    if (!tsvNome) return;
    const idx = REDE_DATA[seg].planos.indexOf(tsvNome);
    if (idx < 0) return;
    const hosps = (REDE_DATA[seg].regioes || {})[regiao] || [];
    cols.push({ seg, plano, tsvNome, idx, color, label: INS[seg]?.label || seg, hosps });
  };

  if (showAtual) addCol(d.atual.seg, d.atual.plano, '#2563EB');
  d.plans.forEach(p => addCol(p.seg, p.plano, p.color));

  if (!cols.length) return `
  <div class="slide-box" id="${redeSlideId(regiao)}">
    <div style="width:960px;min-height:540px;background:#fff;padding:44px;display:flex;align-items:center;justify-content:center;font-family:'Open Sans',sans-serif;box-sizing:border-box">
      <div style="text-align:center;color:#6B6B8A;font-size:13px">Nenhum plano cotado mapeado para rede credenciada.<br>Verifique os planos selecionados.</div>
    </div>
  </div>`;

  // União de todos os hospitais na região, agrupados por cidade
  const hospMap = new Map(); // key: "hosp||city" → { hosp, city, cov: [val, ...] }
  cols.forEach((col, ci) => {
    col.hosps.forEach(row => {
      const key = row.h + '||' + row.c;
      if (!hospMap.has(key)) {
        hospMap.set(key, { hosp: row.h, city: row.c, cov: new Array(cols.length).fill('-') });
      }
      const val = (row.v || {})[String(col.idx)] || '-';
      hospMap.get(key).cov[ci] = val;
    });
  });

  // Agrupar por cidade e ordenar
  const byCity = new Map();
  hospMap.forEach(entry => {
    if (!byCity.has(entry.city)) byCity.set(entry.city, []);
    byCity.get(entry.city).push(entry);
  });
  const cities = [...byCity.keys()].sort();

  // Larguras
  const leftW = 200;
  const colW = Math.max(80, Math.floor((872 - leftW) / cols.length));
  const totalW = leftW + colW * cols.length + 44;
  const slideW = Math.max(960, totalW);

  // Cabeçalho das colunas (operadora + plano)
  const thCols = cols.map(col => `
    <th style="width:${colW}px;padding:10px 8px 8px;text-align:center;background:${col.color};border-left:1px solid rgba(255,255,255,.2);vertical-align:top">
      <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.75);margin-bottom:2px">${esc(col.label)}</div>
      <div style="font-size:10.5px;font-weight:800;color:#fff;line-height:1.25">${esc(col.tsvNome)}</div>
    </th>`).join('');

  // Função de cor para célula de cobertura
  const covStyle = v => {
    if (!v || v === '-') return 'color:#BBBBCC;font-size:11px;font-weight:400';
    if (v.includes('M')) return 'color:#0A0A2E;font-size:10px;font-weight:800';
    return 'color:#1A1A3E;font-size:10px;font-weight:700';
  };

  // Linhas da tabela agrupadas por cidade
  const bodyRows = cities.map(city => {
    const entries = byCity.get(city);
    const cityRow = `<tr>
      <td colspan="${cols.length + 1}" style="padding:6px 12px 4px;background:#F4F4F8;border-top:2px solid #4B4BDB22">
        <span style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#4B4BDB">◎ ${esc(city)}</span>
      </td>
    </tr>`;
    const hospRows = entries.map((e, i) => {
      const bg = i % 2 === 0 ? '#fff' : '#FAFAFC';
      const covCells = e.cov.map(v => `<td style="width:${colW}px;padding:6px 8px;text-align:center;border-left:1px solid #F0F0F5;background:${bg}"><span style="${covStyle(v)}">${v === '-' ? '—' : esc(v)}</span></td>`).join('');
      return `<tr>
        <td style="padding:5px 12px;background:${bg};border-bottom:1px solid #F4F4F8;max-width:${leftW}px">
          <div style="font-size:10.5px;font-weight:600;color:#1A1A3E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.hosp)}</div>
        </td>${covCells}
      </tr>`;
    }).join('');
    return cityRow + hospRows;
  }).join('');

  const gradBar = cols.map(c => c.color).join(', ');

  const slideId = redeSlideId(regiao);
  return `
  <div class="slide-box" id="${slideId}">
    <div style="width:${slideW}px;min-height:540px;background:#fff;padding:32px 44px 28px;position:relative;font-family:'Open Sans',sans-serif;box-sizing:border-box">
      <img src="e3_hor_azul.png" style="position:absolute;top:20px;right:34px;height:26px;max-width:100px;object-fit:contain;opacity:.5">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
        <div style="width:6px;height:36px;background:linear-gradient(180deg,${gradBar});border-radius:3px;flex-shrink:0"></div>
        <div>
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;color:#4B4BDB">COMPARATIVO DE OPERADORAS</div>
          <div style="font-size:18px;font-weight:800;color:#1A1A3E;margin-top:1px">Rede Credenciada — ${esc(regiao)}</div>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-family:'Open Sans',sans-serif">
        <thead>
          <tr>
            <th style="width:${leftW}px;padding:10px 12px;text-align:left;background:#0A0A2E;color:rgba(255,255,255,.5);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px">Hospital</th>
            ${thCols}
          </tr>
        </thead>
        <tbody>${bodyRows}</tbody>
      </table>
      <div style="margin-top:12px;font-size:8.5px;color:#AAAABC;text-align:center">Fonte: Painel do Corretor · Rede sujeita a alterações · H=Hospital · M=Maternidade · PS=Pronto Socorro · PA=Ambulatório</div>
    </div>
  </div>`;
}

/* ═══════════════════ SLIDE — COPARTICIPAÇÃO ═══════════════════ */
function buildCopSlide(seg, planos, copType) {
  const ins = INS[seg] || INS.outro;
  const raw = COPDATA[seg];
  const data = (['amil','hapvida'].includes(seg) && raw && raw.parcial)
    ? (raw[copType] || raw.completo)
    : raw;
  if (!data || !data.procedimentos.length) return '';
  const slideId = `sl-cop-${seg}${copType ? '-' + copType : ''}`;

  // Deduplicate: group planos with identical value arrays
  const groups = [];
  planos.forEach(nome => {
    const copKey = (COP_PLAN_KEY[seg] || {})[nome] || nome;
    const vals = data.planos[copKey];
    if (!vals) return;
    const key = vals.join('|');
    const existing = groups.find(g => g.key === key);
    if (existing) existing.nomes.push(nome);
    else groups.push({ key, nomes: [nome], vals });
  });
  if (!groups.length) return '';

  const thStyle = `padding:9px 10px;text-align:center;font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.6px;border-left:1px solid rgba(255,255,255,.2)`;
  const tdProc  = `padding:8px 12px;font-size:11px;color:#1A1A3E;border-bottom:1px solid #f0f0f5;white-space:nowrap`;
  const tdVal   = `padding:8px 10px;font-size:11px;font-weight:700;color:${ins.color};text-align:center;border-bottom:1px solid #f0f0f5;border-left:1px solid #f0f0f5`;

  const headers = groups.map(g =>
    `<th style="${thStyle}">${g.nomes.join(' / ')}</th>`
  ).join('');

  const rows = data.procedimentos.map((proc, i) => {
    const pcts = groups.map(g => { const m = (g.vals[i] || '').match(/^(\d+%)\·/); return m ? m[1] : null; });
    const allSamePct = pcts[0] && pcts.every(p => p === pcts[0]);
    const procLabel = allSamePct
      ? `${proc}&ensp;<span style="color:${ins.color};font-weight:800;font-size:10px">${pcts[0]}</span>`
      : proc;
    const cols = groups.map(g => {
      const val = allSamePct ? (g.vals[i] || '—').replace(/^\d+%·/, '') : (g.vals[i] || '—');
      return `<td style="${tdVal}">${val}</td>`;
    }).join('');
    return `<tr><td style="${tdProc}">${procLabel}</td>${cols}</tr>`;
  }).join('');

  const tipoTag = data.tipo
    ? `<span style="display:inline-block;margin-left:10px;padding:2px 10px;border-radius:20px;background:${ins.color}1a;color:${ins.color};font-size:11px;font-weight:800;vertical-align:middle">${data.tipo}</span>`
    : '';

  return `
  <div class="slide-box" id="${slideId}">
    <div style="width:960px;min-height:540px;background:#fff;padding:44px 60px;position:relative;font-family:'Open Sans',sans-serif;box-sizing:border-box">
      <img src="e3_hor_azul.png" style="position:absolute;top:22px;right:36px;height:28px;max-width:110px;object-fit:contain;opacity:.55">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
        <div style="width:6px;height:40px;background:${ins.color};border-radius:3px;flex-shrink:0"></div>
        <div>
          <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;color:${ins.color}">${ins.label}</div>
          <div style="font-size:20px;font-weight:800;color:#1A1A3E">Exemplos de Coparticipação${tipoTag}</div>
        </div>
      </div>
      ${data.subtitulo ? `<div style="font-size:10px;color:#6B6B8A;margin-bottom:20px;margin-left:20px">${data.subtitulo}</div>` : ''}
      <table style="width:100%;border-collapse:collapse;border-radius:10px;overflow:hidden">
        <thead>
          <tr style="background:${ins.color}">
            <th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.6px">Procedimento</th>
            ${headers}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

  return `
  <div class="slide-box" id="sl-comp">

      <img src="e3_hor_azul.png" style="position:absolute;top:22px;right:36px;height:32px;max-width:130px;object-fit:contain;opacity:.6">
      <div class="s-title">Resumo Financeiro — <em>${d.atual.vidas} vida${d.atual.vidas!==1?'s':''}</em></div>

      <div class="comp-grid">

        <div class="comp-col study">

          <div class="chart-wrap"><canvas id="ch-estudo"></canvas></div>
          ${(() => {

            const rows = [

              d.plans.map(p => `<span class="vidas-chip">${p.vidas} vida${p.vidas!==1?'s':''}</span>`),

/* ═══════════════════ CHARTS ═══════════════════ */
function drawCharts(d) {
  const allVals = [...(d.showAtual ? [d.atual.valor] : []), ...d.plans.map(p=>p.valor)].filter(v=>v>0);
  const maxV = Math.max(...allVals, 1);
  const yMax = Math.ceil(maxV * 1.3 / 500) * 500;

  const baseOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { enabled: false } },
    animation: { duration: 250 },
    layout: { padding: { top: 28 } },
    scales: {
      x: { grid: { display: false }, border: { display: false }, ticks: { display: false } },
      y: {
        min: 0, max: yMax, border: { display: false },
        grid: { color: '#F0F0F5' },
        ticks: {
          callback: v => 'R$' + (v/1000).toLocaleString('pt-BR',{minimumFractionDigits:0}) + 'k',
          font: { size: 9 }, color: '#9999AA', maxTicksLimit: 6,
        },
      },
    },
  };

  const labelPlugin = (ganhos) => ({
    id: 'lbl',
    afterDraw(chart) {
      const ctx = chart.ctx;
      chart.data.datasets.forEach((ds, di) => {
        chart.getDatasetMeta(di).data.forEach((bar, i) => {
          const v = ds.data[i]; if (!v) return;
          ctx.save();
          // value inside bar
          ctx.font = 'bold 11px "Open Sans"';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(fmt(v), bar.x, bar.y + bar.height / 2);
          ctx.restore();
        });
      });
    },
  });

  const ganhosPorPlano = d.plans.map(p => (d.atual.valor - p.valor) * 12);

  // Atual chart — só renderiza se showAtual=true
  const ca = document.getElementById('ch-atual');
  if (ca && d.showAtual) {
    charts.push(new Chart(ca, {
      type: 'bar',
      data: { labels: [''], datasets: [{ data: [d.atual.valor], backgroundColor: ['#2563EB'], borderRadius: 8, borderSkipped: false }] },
      options: baseOpts,
      plugins: [labelPlugin(null)],
    }));
  }

  // Estudo chart (with ganho anual above each bar)
  const ce = document.getElementById('ch-estudo');
  if (ce && d.plans.length) {
    charts.push(new Chart(ce, {
      type: 'bar',
      data: {
        labels: d.plans.map(p => INS[p.seg]?.label || p.seg),
        datasets: [{ data: d.plans.map(p=>p.valor), backgroundColor: d.plans.map(p=>p.color), borderRadius: 8, borderSkipped: false }],
      },
      options: { ...baseOpts, layout: { padding: { top: 40 } } },
      plugins: [labelPlugin(ganhosPorPlano)],
    }));
  }
}

/* ═══════════════════ PDF ═══════════════════ */
async function gerarPDF() {
  const btn = document.getElementById('pdf-btn');
  btn.disabled = true; btn.textContent = '⏳ Gerando PDF...';
  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [297, 167] });

    const copKeys = [];
    getData().plans.filter(p => p.cop && copSlideMap[p.id]).forEach(p => {
      const key = ['amil','hapvida'].includes(p.seg) ? `${p.seg}-${p.copType || 'completo'}` : p.seg;
      if (!copKeys.includes(key)) copKeys.push(key);
    });
    const redeIds = showRedeComp ? getRedeRegioesSelecionadas().map(r => redeSlideId(r)) : [];
    const midSlides = [...copKeys.map(k => `sl-cop-${k}`), ...redeIds];
    const slideIds = ['sl-cover', 'sl-comp', ...midSlides, 'sl-back'];
    for (const [idx, sid] of slideIds.entries()) {
      const el = document.getElementById(sid);
      if (!el) continue;
      const prevZoom = el.style.zoom;
      el.style.zoom = 1;
      const childEl = el.firstElementChild;
      const isRede = sid.startsWith('sl-rede-');
      const isWhite = sid === 'sl-comp' || sid.startsWith('sl-cop-') || isRede;
      const canvas = await html2canvas(childEl, { scale: 2, useCORS: true, logging: false, backgroundColor: isWhite ? '#ffffff' : '#0A0A2E' });
      el.style.zoom = prevZoom;
      const img = canvas.toDataURL('image/jpeg', 0.95);
      if (idx > 0) {
        const slideW = childEl.offsetWidth || 960;
        const slideH = childEl.offsetHeight || 540;
        const pageH = isRede ? Math.round((slideH / slideW) * 297) : 167;
        pdf.addPage([297, pageH]);
      }
      const slideW = childEl.offsetWidth || 960;
      const slideH = childEl.offsetHeight || 540;
      const pageH = isRede ? Math.round((slideH / slideW) * 297) : 167;
      pdf.addImage(img, 'JPEG', 0, 0, 297, pageH);
    }

    const d = getData();
    const name = `cotacao_${d.empresa.replace(/[^\w]/g,'_').slice(0,25)}_${d.mesano.replace('/','_')}.pdf`;
    pdf.save(name);
  } catch(e) { alert('Erro ao gerar PDF: ' + e.message); }
  btn.disabled = false; btn.innerHTML = '⬇ Baixar PDF';
}

/* ═══════════════════ UTILS ═══════════════════ */
function fmt(v) { return 'R$ ' + (+v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
