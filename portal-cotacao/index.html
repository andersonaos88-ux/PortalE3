<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:    #0A0A2E;
  --purple:  #4B4BDB;
  --gray-bg: #F4F4F8;
  --border:  #E0E0EC;
  --text:    #1A1A3E;
  --muted:   #6B6B8A;
  --white:   #FFFFFF;
  --danger:  #E53935;

  --bradesco:    #CC0000;
  --sulamerica:  #E8661A;
  --amil:        #3B2F9E;
  --portoseguro: #005FAF;
  --hapvida:     #00873D;
  --atual:       #2563EB;
}

body { font-family: 'Open Sans', system-ui, sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; }

/* ãã HEADER ãã */
.header {
  background: var(--navy); color: var(--white);
  padding: 14px 28px; display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.35);
}
.header .logo { width: 38px; height: 38px; background: var(--white); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; color: var(--navy); letter-spacing: -1px; }
.header h1 { font-size: 17px; font-weight: 700; }
.header p  { font-size: 11px; color: rgba(255,255,255,.5); }

/* ãã LAYOUT ãã */
.layout { display: grid; grid-template-columns: 430px 1fr; min-height: calc(100vh - 66px); }

/* ãã SIDEBAR ãã */
.sidebar { background: var(--white); border-right: 1px solid var(--border); overflow-y: auto; max-height: calc(100vh - 66px); position: sticky; top: 66px; display: flex; flex-direction: column; }
.sidebar-body { flex: 1; padding: 22px; overflow-y: auto; }
.sidebar-footer { padding: 14px 22px; border-top: 1px solid var(--border); background: var(--white); }

/* section title */
.stitle { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.4px; color: var(--purple); border-bottom: 2px solid var(--purple); padding-bottom: 6px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.stitle span { font-size: 15px; }
.fsec { margin-bottom: 26px; }

/* form elements */
.fg { margin-bottom: 12px; }
.fg label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .6px; }
.fg input, .fg select {
  width: 100%; padding: 9px 11px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 13px; color: var(--text); background: var(--white);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.fg input:focus, .fg select:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(75,75,219,.12); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* cop toggle */
.cop-toggle { display: flex; gap: 8px; }
.cop-btn {
  flex: 1; padding: 8px 6px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 12px; font-weight: 700; cursor: pointer; background: var(--white); color: var(--muted);
  transition: all .15s; text-align: center;
}
.cop-btn.active-sim { border-color: #16a34a; background: #f0fdf4; color: #15803d; }
.cop-btn.active-nao { border-color: #dc2626; background: #fef2f2; color: #b91c1c; }
.cop-btn:hover { border-color: var(--purple); }

/* insurer select */
.ins-wrap { position: relative; }
.ins-dot { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 9px; height: 9px; border-radius: 50%; pointer-events: none; }
.ins-wrap select { padding-left: 26px; }

/* plan card */
.pcard {
  background: var(--gray-bg); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 10px;
}
.pcard-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.pcard-title { font-size: 11px; font-weight: 800; color: var(--purple); text-transform: uppercase; letter-spacing: .8px; display: flex; align-items: center; gap: 6px; }
.pnum { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: var(--white); }
.rm-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 5px; border-radius: 4px; line-height: 1; transition: all .15s; }
.rm-btn:hover { background: #fee2e2; color: var(--danger); }

/* add plan */
.add-btn {
  width: 100%; padding: 10px; border: 2px dashed var(--border);
  border-radius: 10px; background: none; cursor: pointer;
  color: var(--purple); font-size: 13px; font-weight: 700;
  transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.add-btn:hover:not(:disabled) { border-color: var(--purple); background: #f0f0ff; }
.add-btn:disabled { opacity: .4; cursor: not-allowed; }

/* footer button */
.gen-btn {
  width: 100%; padding: 13px; background: var(--purple); color: var(--white);
  border: none; border-radius: 10px; font-size: 14px; font-weight: 800;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .2s;
}
.gen-btn:hover { background: var(--navy); box-shadow: 0 4px 18px rgba(75,75,219,.3); }

/* ãã PREVIEW AREA ãã */
.preview { padding: 28px 24px; overflow-y: auto; background: #DDDDE8; display: flex; flex-direction: column; align-items: center; gap: 20px; }

.preview-bar {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  background: var(--white); border-radius: 10px; padding: 10px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.preview-bar span { font-size: 12px; font-weight: 600; color: var(--muted); }
.pdf-btn {
  padding: 8px 18px; background: var(--navy); color: var(--white); border: none;
  border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: background .15s;
}
.pdf-btn:hover { background: var(--purple); }
.pdf-btn:disabled { opacity: .6; cursor: not-allowed; }

.slides-wrap { display: flex; flex-direction: column; gap: 20px; align-items: center; }
.slide-box { box-shadow: 0 6px 28px rgba(0,0,0,.2); border-radius: 8px; overflow: hidden; }

/* empty */
.empty { min-height: 360px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 10px; }
.empty .icon { font-size: 44px; opacity: .35; }
.empty p { font-size: 13px; }

/* ããããããããããããããããããããããããããããããã
   SLIDE 1 ã COVER
ããããããããããããããããããããããããããããããã */
.s-cover {
  width: 960px; height: 540px;
  background: var(--navy);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 52px 60px;
}
.s-cover .bg-circle {
  position: absolute; right: -80px; top: -80px;
  width: 520px; height: 520px; border-radius: 50%;
  background: rgba(75,75,219,.18);
}
.s-cover .bg-circle2 {
  position: absolute; right: 80px; top: 60px;
  width: 340px; height: 340px; border-radius: 50%;
  background: rgba(75,75,219,.12);
}
.s-cover .bg-lines {
  position: absolute; right: 50px; top: 0;
  width: 440px; height: 440px; border-radius: 50%;
  background: repeating-linear-gradient(32deg,transparent,transparent 5px,rgba(100,100,220,.3) 5px,rgba(100,100,220,.3) 7px);
  opacity: .5;
}
.s-cover .tag { font-family: 'Industry','Industry Book',sans-serif; font-size: 10px; letter-spacing: 2.5px; color: rgba(255,255,255,.45); text-transform: uppercase; }
.s-cover .title { font-family: 'Industry','Industry Book',sans-serif; font-size: 54px; font-weight: 300; color: var(--white); line-height: 1.08; margin-bottom: 20px; }
.s-cover .title strong { font-family: 'Industry','Industry Book',sans-serif; font-weight: 800; }
.s-cover .company { font-family: 'Industry','Industry Book',sans-serif; font-size: 17px; font-weight: 900; color: var(--white); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
.s-cover .date { font-family: 'Open Sans',sans-serif; font-size: 13px; color: rgba(255,255,255,.5); }
.s-cover .logo-area { position: absolute; left: 60px; top: 36px; display: flex; flex-direction: column; align-items: flex-start; gap: 3px; }
.s-cover .logo-box { width: 46px; height: 46px; background: var(--white); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: var(--navy); letter-spacing: -1px; }
.s-cover .logo-txt { font-size: 10px; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

/* ããããããããããããããããããããããããããããããã
   SLIDE 3 ã BACK COVER
ããããããããããããããããããããããããããããããã */
.s-back {
  width: 960px; height: 540px;
  background: var(--navy);
  display: flex; align-items: center; justify-content: center;
}
.s-back .back-logo-wrap {
  display: flex; flex-direction: column; align-items: center;
  padding-right: 60px;
}
.s-back .back-logo-wrap img { width: 130px; object-fit: contain; }
.s-back .back-sep { width: 1px; height: 110px; background: rgba(255,255,255,.3); }
.s-back .back-tagline {
  padding-left: 60px;
  font-family: 'Industry','Industry Book',sans-serif;
  font-size: 22px; font-weight: 300; color: rgba(255,255,255,.85); letter-spacing: .3px;
}

/* ããããããããããããããããããããããããããããããã
   SLIDE 2 ã COMPARISON
ããããããããããããããããããããããããããããããã */
.s-comp {
  width: 960px; min-height: 540px;
  background: var(--white);
  padding: 36px 44px 28px;
  position: relative;
}
.s-comp .s-title { text-align: center; font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 28px; }
.s-comp .s-title em { font-style: normal; font-weight: 400; color: var(--muted); }

.comp-grid { display: flex; gap: 0; align-items: stretch; }
.comp-col { display: flex; flex-direction: column; }
.comp-col.atual { width: 200px; flex-shrink: 0; }
.comp-col.study { flex: 1; }

.col-label { text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text); margin-bottom: 10px; }

.ins-tag {
  display: inline-block; padding: 4px 14px; border-radius: 20px;
  border: 1.5px solid; font-size: 11px; font-weight: 700; margin-bottom: 4px;
}

.chart-wrap { height: 260px; position: relative; }
canvas { display: block; }

.plan-meta { display: flex; flex-direction: column; align-items: center; margin-top: 5px; gap: 2px; }
.plan-name-label { font-size: 10px; font-weight: 700; }
.cop-chip {
  font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .4px;
}
.cop-chip.sim { background: #dcfce7; color: #15803d; }
.cop-chip.nao { background: #fee2e2; color: #b91c1c; }
.vidas-chip { font-size: 9px; color: var(--muted); }
/* reajuste toggle */
.reaj-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  background: #eff6ff; border: 1.5px solid #3b82f6;
  cursor: pointer; margin-top: 8px;
}
.reaj-toggle input { accent-color: #2563eb; width: 15px; height: 15px; cursor: pointer; }
.reaj-toggle label { font-size: 11px; font-weight: 700; color: #1d4ed8; cursor: pointer; line-height: 1.3; }
.reaj-fields { margin-top: 8px; padding: 10px; background: #eff6ff; border-radius: 8px; border: 1.5px solid #bfdbfe; }
.reaj-chip {
  font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  background: #eff6ff; color: #1d4ed8; letter-spacing: .3px;
}

/* cop slide toggle */
.cop-slide-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  background: #f0fdf4; border: 1.5px solid #16a34a;
  cursor: pointer; margin-top: 8px;
}
.cop-slide-toggle input { accent-color: #16a34a; width: 15px; height: 15px; cursor: pointer; }
.cop-slide-toggle label { font-size: 11px; font-weight: 700; color: #15803d; cursor: pointer; line-height: 1.3; }

.reembolso-chip {
  font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  background: #eff6ff; color: #1d4ed8; letter-spacing: .3px;
}

/* ganho anual */
.ganho-chip {
  font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px;
  letter-spacing: .3px; margin-top: 3px; white-space: nowrap;
}
.ganho-chip.positivo { background: #dcfce7; color: #15803d; }
.ganho-chip.negativo { background: #fee2e2; color: #b91c1c; }
.ganho-chip.neutro   { background: #f1f5f9; color: var(--muted); }
.ganho-label { font-size: 8px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-top: 1px; }

/* study plans grid ã each row aligns across all plan columns */
.study-plans-grid { display: grid; text-align: center; gap: 3px 0; }
.study-plans-grid > * { display: flex; align-items: center; justify-content: center; }

/* reembolso removed, just empty for alignment */
.divider { height: 3px; background: linear-gradient(90deg, var(--purple), #818cf8); border-radius: 2px; margin: 20px 0 12px; }
.legend-row { display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); font-weight: 700; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; }

/* ãã Separator between atual and study ãã */
.vert-sep { width: 1px; background: var(--border); margin: 0 20px; }

/* ãããããããããããããããããããããããããããããããããããããã
   RESPONSIVO ã MOBILE (ãÊ 767px)
   Desktop permanece 100% inalterado
ãããããããããããããããããããããããããããããããããããããã */
@media (max-width: 767px) {

  /* Layout: empilha sidebar + preview */
  .layout {
    grid-template-columns: 1fr;
    min-height: auto;
  }

  /* Sidebar: deixa de ser sticky e usa altura natural */
  .sidebar {
    position: static;
    max-height: none;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }

  /* Preview: menos padding lateral */
  .preview {
    padding: 16px 10px;
    gap: 14px;
  }

  /* Header: oculta subtûÙtulo de seguradoras */
  .header p { display: none; }
  .header h1 { font-size: 15px; }

  /* FormulûÀrio: colunas colapsam em 1 */
  .row2 { grid-template-columns: 1fr; }
  .row3 { grid-template-columns: 1fr 1fr 1fr; } /* mantûˋm 3 cols (vidas + valor) */

  /* BotûÈo gerar PDF na barra de preview */
  .preview-bar {
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 14px;
  }
  .pdf-btn { width: 100%; justify-content: center; }
}

</style>
</head>
<body>

<header class="header">
  <div class="logo">E3</div>
  <div>
    <h1>Portal de CotaûÏûÈo ã Plano de Saû¤de</h1>
    <p>Bradesco ôñ SulAmûˋrica ôñ Amil ôñ Porto Seguro ôñ Hapvida</p>
  </div>
</header>

<div class="layout">

  <!-- ãã SIDEBAR ãã -->
  <aside class="sidebar">
    <div class="sidebar-body">

      <!-- Dados do cliente -->
      <div class="fsec">
        <div class="stitle"><span>ÞÂ</span> Dados do Cliente</div>
        <div class="fg">
          <label>Nome da empresa / cliente</label>
          <input id="empresa" type="text" placeholder="Ex: Empresa ABC Ltda" oninput="render()">
        </div>
        <div class="row2">
          <div class="fg">
            <label>Mûˆs / Ano</label>
            <input id="mesano" type="month" oninput="render()">
          </div>
          <div class="fg">
            <label>Consultor</label>
            <input id="consultor" type="text" placeholder="Seu nome" oninput="render()">
          </div>
        </div>
      </div>

      <!-- Plano atual -->
      <div class="fsec">
        <div class="stitle"><span>Þ</span> Plano Atual</div>
        <div class="row2">
          <div class="fg">
            <label>Seguradora</label>
            <div class="ins-wrap">
              <div class="ins-dot" id="dot-atual" style="background:var(--atual)"></div>
              <select id="a-seg" onchange="syncDot('atual','a-seg'); syncAtualPlanOpts(); autoFillAtualReembolso(); render()">
                <option value="bradesco">Bradesco</option>
                <option value="sulamerica">SulAmûˋrica</option>
                <option value="amil">Amil</option>
                <option value="portoseguro">Porto Seguro</option>
                <option value="hapvida">Hapvida</option>
                <option value="outro">Outro</option>
              </select>
            </div>
          </div>
          <div class="fg">
            <label>Nome do Plano</label>
            <select id="a-plano" onchange="autoFillAtualReembolso(); render()"></select>
          </div>
        </div>
        <div class="row2">
          <div class="fg">
            <label>Nô¤ de Vidas</label>
            <input id="a-vidas" type="number" min="1" value="3" oninput="render()">
          </div>
          <div class="fg">
            <label>Valor Mensal (R$)</label>
            <input id="a-valor" type="number" min="0" step="0.01" placeholder="4140.00" oninput="render()">
          </div>
        </div>
        <div class="fg">
          <label>CoparticipaûÏûÈo</label>
          <div class="cop-toggle">
            <button class="cop-btn" id="cop-a-sim" onclick="setCop('a',true)">ã Com CoparticipaûÏûÈo</button>
            <button class="cop-btn active-nao" id="cop-a-nao" onclick="setCop('a',false)">ã Sem CoparticipaûÏûÈo</button>
          </div>
        </div>
        <div class="fg">
          <label>Reembolso por consulta (R$) <span style="font-weight:400;color:var(--muted)">(opcional)</span></label>
          <input id="a-reembolso" type="number" min="0" step="0.01" placeholder="Ex: 300.00" oninput="render()">
        </div>
      </div>

      <!-- Planos cotados -->
      <div class="fsec">
        <div class="stitle"><span>Þ</span> Planos Cotados</div>
        <div id="plans-list"></div>
        <button class="add-btn" id="add-btn" onclick="addPlan()">ÿ¥ Adicionar plano</button>
      </div>

    </div>
    <div class="sidebar-footer">
      <button class="gen-btn" onclick="render()">Þ Atualizar Preview</button>
    </div>
  </aside>

  <!-- ãã PREVIEW ãã -->
  <main class="preview">
    <div class="preview-bar">
      <span>Þ Preview do documento</span>
      <button class="pdf-btn" id="pdf-btn" onclick="gerarPDF()">ã˜ Baixar PDF</button>
    </div>
    <div id="doc-wrap" class="slides-wrap">
      <div class="empty"><div class="icon">Þ</div><p>Preencha os dados e o preview aparece aqui</p></div>
    </div>
  </main>

/* ããããããããããããããããããã STATE ããããããããããããããããããã */
let plans = [];
let copMap = { a: false };
let copSlideMap = {};   // id ã true/false: incluir slide de cop
let copTypeMap  = {};  // id ã 'parcial' | 'completo' (Amil e Hapvida)
let reajMap = {};      // id ã true/false: mostrar reajuste
let reembShowMap = {}; // id ã true/false: exibir reembolso no slide
let counter = 0;
let charts = [];
let renderGen = 0;

/* ããããããããããããããããããã INIT ããããããããããããããããããã */
window.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('mesano').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  syncAtualPlanOpts();
  addPlan();
  render();
});


/* ããããããããããããããããããã COP TOGGLE ããããããããããããããããããã */
function setCop(id, val) {
  copMap[id] = val;
  // For plan cards, rebuild to show/hide cop slide checkbox
  if (id !== 'a') {
    renderPlanCards();
  } else {
    const sim = document.getElementById(`cop-${id}-sim`);
    const nao = document.getElementById(`cop-${id}-nao`);
    if (sim) sim.className = 'cop-btn' + (val ? ' active-sim' : '');
    if (nao) nao.className = 'cop-btn' + (!val ? ' active-nao' : '');
  }
  render();
}

/* ããããããããããããããããããã INSURER DOT ããããããããããããããããããã */
function syncDot(dotId, selId) {
  const sel = document.getElementById(selId);
  const dot = document.getElementById('dot-' + dotId);
  if (sel && dot) dot.style.background = (INS[sel.value] || INS.outro).color;
}

/* ããããããããããããããããããã PLANS ããããããããããããããããããã */
function addPlan() {
  if (plans.length >= 4) return;
  const id = ++counter;
  plans.push(id);
  copMap['p' + id] = false;
  copSlideMap[id] = false;
  copTypeMap[id] = null;
  reajMap[id] = false;
  reembShowMap[id] = false;
  renderPlanCards();
  updateAddBtn();
  render();
}

function removePlan(id) {
  plans = plans.filter(x => x !== id);
  delete copMap['p' + id];
  delete copSlideMap[id];
  delete copTypeMap[id];
  delete reajMap[id];
  delete reembShowMap[id];
  renderPlanCards();
  updateAddBtn();
  render();
}

function syncPlanOpts(id) {
  const seg   = document.getElementById(`p${id}-seg`)?.value || 'bradesco';
  const sel   = document.getElementById(`p${id}-plano`);
  if (!sel) return;
  const opts  = PLANS[seg] || [];
  const prev  = sel.value;
  sel.innerHTML = opts.length
    ? opts.map(p => `<option value="${p}"${p===prev?' selected':''}>${p}</option>`).join('')
    : '<option value="">ã</option>';
}

function syncAtualPlanOpts() {
  const seg  = document.getElementById('a-seg')?.value || 'bradesco';
  const sel  = document.getElementById('a-plano');
  if (!sel) return;
  const opts = PLANS[seg] || [];
  const prev = sel.value;
  sel.innerHTML = opts.length
    ? opts.map(p => `<option value="${p}"${p===prev?' selected':''}>${p}</option>`).join('')
    : '<option value="">ã</option>';
}

function toggleCopSlide(id) {
  copSlideMap[id] = !copSlideMap[id];
  render();
}

function toggleReaj(id) {
  reajMap[id] = !reajMap[id];
  renderPlanCards();
  if (reajMap[id]) autoFillReaj(id);
  render();
}

function autoFillReaj(id) {
  const seg = document.getElementById(`p${id}-seg`)?.value;
  const data = REAJUSTE_DATA[seg];
  if (!data) return;
  const reaj5  = document.getElementById(`p${id}-reaj5`);
  const reajat = document.getElementById(`p${id}-reajat`);
  if (reaj5  && !reaj5.value)  reaj5.value  = data.media5;
  if (reajat && !reajat.value) reajat.value = data.vigente;
}

function toggleReembShow(id) {
  reembShowMap[id] = !reembShowMap[id];
  renderPlanCards();
  render();
}

function autoFillReembolso(id) {
  const seg   = document.getElementById(`p${id}-seg`)?.value;
  const plano = document.getElementById(`p${id}-plano`)?.value;
  const val   = REEMBOLSO_DATA[seg]?.[plano];
  const input = document.getElementById(`p${id}-reembolso`);
  if (!input) return;
  if (Array.isArray(val)) {
    input.value = '';
  } else if (val) {
    input.value = val.toFixed(2);
  } else {
    input.value = '';
  }
  renderPlanCards();
  render();
}

function autoFillAtualReembolso() {
  const seg   = document.getElementById('a-seg')?.value;
  const plano = document.getElementById('a-plano')?.value;
  const val   = REEMBOLSO_DATA[seg]?.[plano];
  const input = document.getElementById('a-reembolso');
  if (!input) return;
  if (Array.isArray(val)) {
    input.value = val[0].toFixed(2);
  } else if (val) {
    input.value = val.toFixed(2);
  } else {
    input.value = '';
  }
  render();
}

function setCopType(id, type) {
  copTypeMap[id] = type;

}

/* ããããããããããããããããããã COLLECT DATA ããããããããããããããããããã */
function getData() {
  const mv = document.getElementById('mesano').value;
  let label = '';
  if (mv) {
    const [y, m] = mv.split('-');
    const M = ['Janeiro','Fevereiro','MarûÏo','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    label = `${M[+m-1]}/${y}`;
  }
  return {
    empresa:   document.getElementById('empresa').value.trim() || 'Nome da Empresa',
    mesano:    label || 'Mûˆs/Ano',
    consultor: document.getElementById('consultor').value.trim(),
    atual: {
      seg:   document.getElementById('a-seg').value,
      plano: document.getElementById('a-plano').value.trim() || 'ã',
      vidas: parseInt(document.getElementById('a-vidas').value) || 1,
      valor: parseFloat(document.getElementById('a-valor').value) || 0,
      cop:      copMap['a'] || false,
      reembolso: parseFloat(document.getElementById('a-reembolso').value) || 0,
    },
    plans: plans.map((id,i) => {
      const seg = document.getElementById(`p${id}-seg`)?.value || 'outro';
      return {
        id,
        color: (INS[seg] || INS.outro).color,
        seg,
        plano: document.getElementById(`p${id}-plano`)?.value.trim() || 'ã',
        vidas: parseInt(document.getElementById(`p${id}-vidas`)?.value) || 1,
        valor: parseFloat(document.getElementById(`p${id}-valor`)?.value) || 0,
        cop:      copMap['p'+id] || false,
        copType:  copTypeMap[id] || null,
        reembolso: reembShowMap[id] ? (parseFloat(document.getElementById(`p${id}-reembolso`)?.value) || 0) : 0,
        reaj:     reajMap[id] || false,
        reaj5:    parseFloat(document.getElementById(`p${id}-reaj5`)?.value) || 0,
        reajat:   parseFloat(document.getElementById(`p${id}-reajat`)?.value) || 0,
      };
    }),
  };
}

/* ããããããããããããããããããã RENDER ããããããããããããããããããã */
function render() {
  charts.forEach(c => { try { c.destroy(); } catch(_){} });
  charts = [];

  const d = getData();
  const wrap = document.getElementById('doc-wrap');
  // Group cop slides by insurer (one slide per insurer with all selected plans)
  const copByKey = {};
  d.plans.filter(p => p.cop && copSlideMap[p.id]).forEach(p => {
    const key = ['amil','hapvida'].includes(p.seg) ? `${p.seg}-${p.copType || 'completo'}` : p.seg;
    if (!copByKey[key]) copByKey[key] = { seg: p.seg, copType: p.copType || null, planos: [] };
    if (!copByKey[key].planos.includes(p.plano)) copByKey[key].planos.push(p.plano);
  });
  const copSlides = Object.values(copByKey)
    .map(info => buildCopSlide(info.seg, info.planos, info.copType))
    .join('');
  wrap.innerHTML = buildCover(d) + buildComp(d) + copSlides + buildBackCover();

  applyZoom();
  const gen = ++renderGen;
  setTimeout(() => { if (gen === renderGen) drawCharts(d); }, 60);
}

function applyZoom() {
  const area = document.querySelector('.preview');
  if (!area) return;
  const st = getComputedStyle(area);
  const hPad = parseFloat(st.paddingLeft) + parseFloat(st.paddingRight);
  const avail = area.clientWidth - hPad;
  const z = Math.min(1, avail / 960);
  document.querySelectorAll('.slide-box').forEach(el => el.style.zoom = z);
}
window.addEventListener('resize', applyZoom);

/* ããããããããããããããããããã SLIDE 1 ã COVER ããããããããããããããããããã */

/* ããããããããããããããããããã SLIDE ã COPARTICIPAûûO ããããããããããããããããããã */
function buildCopSlide(seg, planos, copType) {
  const ins = INS[seg] || INS.outro;
  const raw = COPDATA[seg];
  const data = (['amil','hapvida'].includes(seg) && raw && raw.parcial)
    ? (raw[copType] || raw.completo)
    : raw;
  if (!data || !data.procedimentos.length) return '';
  const slideId = `sl-cop-${seg}${copType ? '-' + copType : ''}`;

  // Deduplicate: group planos with identical value arrays
  const groups = [];
  planos.forEach(nome => {
    const vals = data.planos[nome];
    if (!vals) return;
    const key = vals.join('|');
    const existing = groups.find(g => g.key === key);
    if (existing) existing.nomes.push(nome);
    else groups.push({ key, nomes: [nome], vals });
  });
  if (!groups.length) return '';

  const thStyle = `padding:9px 10px;text-align:center;font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.6px;border-left:1px solid rgba(255,255,255,.2)`;
  const tdProc  = `padding:8px 12px;font-size:11px;color:#1A1A3E;border-bottom:1px solid #f0f0f5;white-space:nowrap`;
  const tdVal   = `padding:8px 10px;font-size:11px;font-weight:700;color:${ins.color};text-align:center;border-bottom:1px solid #f0f0f5;border-left:1px solid #f0f0f5`;

  const headers = groups.map(g =>
    `<th style="${thStyle}">${g.nomes.join(' / ')}</th>`
  ).join('');

  const rows = data.procedimentos.map((proc, i) => {
    const cols = groups.map(g => `<td style="${tdVal}">${g.vals[i] || 'ã'}</td>`).join('');
    return `<tr><td style="${tdProc}">${proc}</td>${cols}</tr>`;
  }).join('');

  const tipoTag = data.tipo
    ? `<span style="display:inline-block;margin-left:10px;padding:2px 10px;border-radius:20px;background:${ins.color}1a;color:${ins.color};font-size:11px;font-weight:800;vertical-align:middle">${data.tipo}</span>`
    : '';

  return `
  <div class="slide-box" id="${slideId}">
    <div style="width:960px;min-height:540px;background:#fff;padding:44px 60px;position:relative;font-family:'Open Sans',sans-serif;box-sizing:border-box">
      <img src="e3_hor_azul.png" style="position:absolute;top:22px;right:36px;height:28px;max-width:110px;object-fit:contain;opacity:.55">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
        <div style="width:6px;height:40px;background:${ins.color};border-radius:3px;flex-shrink:0"></div>
        <div>
          <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;color:${ins.color}">${ins.label}</div>
          <div style="font-size:20px;font-weight:800;color:#1A1A3E">Exemplos de CoparticipaûÏûÈo${tipoTag}</div>
        </div>
      </div>
      ${data.subtitulo ? `<div style="font-size:10px;color:#6B6B8A;margin-bottom:20px;margin-left:20px">${data.subtitulo}</div>` : ''}
      <table style="width:100%;border-collapse:collapse;border-radius:10px;overflow:hidden">
        <thead>
          <tr style="background:${ins.color}">
            <th style="padding:9px 12px;text-align:left;font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.6px">Procedimento</th>
            ${headers}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

/* ããããããããããããããããããã SLIDE 2 ã COMPARISON ããããããããããããããããããã */
function buildComp(d) {
  const totalVidas = d.atual.vidas;

  const insLegend = [...new Set([d.atual.seg, ...d.plans.map(p=>p.seg)])].map(k => {
    const ins = INS[k] || INS.outro;
    return `<div class="leg-item"><div class="leg-dot" style="background:${ins.color}"></div>${ins.label}</div>`;
  }).join('');

  const estudoTags = d.plans.map(p => {
    const ins = INS[p.seg] || INS.outro;
    return `<span class="ins-tag" style="border-color:${ins.color}; color:${ins.color}">${ins.label}</span>`;
  }).join(' ');

  const atualIns = INS[d.atual.seg] || INS.outro;

  return `
  <div class="slide-box" id="sl-comp">
    <div class="s-comp">
      <img src="e3_hor_azul.png" style="position:absolute;top:22px;right:36px;height:32px;max-width:130px;object-fit:contain;opacity:.6">
      <div class="s-title">Resumo Financeiro ã <em>${d.atual.vidas} vida${d.atual.vidas!==1?'s':''}</em></div>

      <div class="comp-grid">
        <!-- ATUAL -->
        <div class="comp-col atual">
          <div class="col-label">Plano Atual</div>
          <div style="text-align:center; margin-bottom:8px">
            <span class="ins-tag" style="border-color:var(--atual); color:var(--atual)">${atualIns.label}</span>
          </div>
          <div class="chart-wrap"><canvas id="ch-atual"></canvas></div>
          <div class="plan-meta">
            <span class="plan-name-label" style="color:var(--atual)">${esc(d.atual.plano)}</span>
            <span class="cop-chip ${d.atual.cop?'sim':'nao'}">${d.atual.cop?'Com CoparticipaûÏûÈo':'Sem CoparticipaûÏûÈo'}</span>
            <span class="vidas-chip">${d.atual.vidas} vida${d.atual.vidas!==1?'s':''}</span>
            ${d.atual.reembolso ? `<span class="reembolso-chip">ãˋ Reembolso consulta ${fmt(d.atual.reembolso)}</span>` : ''}
          </div>
        </div>

        <div class="vert-sep"></div>

        <!-- ESTUDO -->
        <div class="comp-col study">
          <div class="col-label">Estudo de Planos</div>
          <div style="text-align:center; margin-bottom:8px">${estudoTags}</div>
          <div class="chart-wrap"><canvas id="ch-estudo"></canvas></div>
          ${(() => {
            const n = d.plans.length;
            const cols = `repeat(${n}, 1fr)`;
            const ganhos = d.plans.map(p => (d.atual.valor - p.valor) * 12);
            const rows = [
              d.plans.map(p => `<span class="plan-name-label" style="color:${p.color}">${esc(p.plano)}</span>`),
              d.plans.map(p => {
                let label = p.cop ? 'C/Cop' : 'S/Cop';
                if (p.cop && ['amil','hapvida'].includes(p.seg) && p.copType) label = `C/Cop ${p.copType.charAt(0).toUpperCase() + p.copType.slice(1)}`;
                return `<span class="cop-chip ${p.cop?'sim':'nao'}">${label}</span>`;
              }),
              d.plans.map(p => `<span class="vidas-chip">${p.vidas} vida${p.vidas!==1?'s':''}</span>`),
              d.plans.map((p,i) => { const g=ganhos[i]; const cls=g>0?'positivo':g<0?'negativo':'neutro'; const icon=g>0?'ã¥':g<0?'ãý':'='; return `<span class="ganho-chip ${cls}">${icon} ${fmt(Math.abs(g))}</span>`; }),
              d.plans.map((p,i) => { const g=ganhos[i]; const lbl=g>0?'Economia anual':g<0?'Acrûˋscimo anual':'Sem variaûÏûÈo'; return `<span class="ganho-label">${lbl}</span>`; }),
              d.plans.map(p => p.reembolso ? `<span class="reembolso-chip">ãˋ Reembolso consulta ${fmt(p.reembolso)}</span>` : `<span></span>`),
              d.plans.map(p => p.reaj && p.reaj5  ? `<span class="reaj-chip">Þ Mûˋdia 5 anos: ${p.reaj5.toLocaleString('pt-BR',{minimumFractionDigits:1})}%</span>`  : `<span></span>`),
              d.plans.map(p => p.reaj && p.reajat ? `<span class="reaj-chip">Þ Reajuste atual: ${p.reajat.toLocaleString('pt-BR',{minimumFractionDigits:1})}%</span>` : `<span></span>`),
            ];
            return `<div class="study-plans-grid" style="grid-template-columns:${cols}">${rows.flat().join('')}</div>`;
          })()}
        </div>
      </div>

      <div class="divider"></div>
      <div style="text-align:center; font-size:9px; color:var(--muted); font-weight:800; text-transform:uppercase; letter-spacing:1.2px; margin-bottom:8px">Legenda das Seguradoras/Operadoras</div>
      <div class="legend-row">${insLegend}</div>
    </div>
  </div>`;
}

/* ããããããããããããããããããã CHARTS ããããããããããããããããããã */
function drawCharts(d) {
  const allVals = [d.atual.valor, ...d.plans.map(p=>p.valor)].filter(v=>v>0);
  const maxV = Math.max(...allVals, 1);
  const yMax = Math.ceil(maxV * 1.3 / 500) * 500;

  const baseOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { enabled: false } },
    animation: { duration: 250 },
    layout: { padding: { top: 28 } },
    scales: {
      x: { grid: { display: false }, border: { display: false }, ticks: { display: false } },
      y: {
        min: 0, max: yMax, border: { display: false },
        grid: { color: '#F0F0F5' },
        ticks: {
          callback: v => 'R$' + (v/1000).toLocaleString('pt-BR',{minimumFractionDigits:0}) + 'k',
          font: { size: 9 }, color: '#9999AA', maxTicksLimit: 6,
        },
      },
    },
  };

  const labelPlugin = (ganhos) => ({
    id: 'lbl',
    afterDraw(chart) {
      const ctx = chart.ctx;
      chart.data.datasets.forEach((ds, di) => {
        chart.getDatasetMeta(di).data.forEach((bar, i) => {
          const v = ds.data[i]; if (!v) return;
          ctx.save();
          // value inside bar
          ctx.font = 'bold 11px "Open Sans"';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(fmt(v), bar.x, bar.y + bar.height / 2);
          ctx.restore();
        });
      });
    },
  });

  const ganhosPorPlano = d.plans.map(p => (d.atual.valor - p.valor) * 12);

  // Atual chart (no ganho label)
  const ca = document.getElementById('ch-atual');
  if (ca) {
    charts.push(new Chart(ca, {
      type: 'bar',
      data: { labels: [''], datasets: [{ data: [d.atual.valor], backgroundColor: ['#2563EB'], borderRadius: 8, borderSkipped: false }] },
      options: baseOpts,
      plugins: [labelPlugin(null)],
    }));
  }

  // Estudo chart (with ganho anual above each bar)
  const ce = document.getElementById('ch-estudo');
  if (ce && d.plans.length) {
    charts.push(new Chart(ce, {
      type: 'bar',
      data: {
        labels: d.plans.map(p => INS[p.seg]?.label || p.seg),
        datasets: [{ data: d.plans.map(p=>p.valor), backgroundColor: d.plans.map(p=>p.color), borderRadius: 8, borderSkipped: false }],
      },
      options: { ...baseOpts, layout: { padding: { top: 40 } } },
      plugins: [labelPlugin(ganhosPorPlano)],
    }));
  }
}

/* ããããããããããããããããããã PDF ããããããããããããããããããã */
async function gerarPDF() {
  const btn = document.getElementById('pdf-btn');
  btn.disabled = true; btn.textContent = 'ã° Gerando PDF...';
  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [297, 167] });

    const copKeys = [];
    getData().plans.filter(p => p.cop && copSlideMap[p.id]).forEach(p => {
      const key = ['amil','hapvida'].includes(p.seg) ? `${p.seg}-${p.copType || 'completo'}` : p.seg;
      if (!copKeys.includes(key)) copKeys.push(key);
    });
    const slideIds = ['sl-cover', 'sl-comp', ...copKeys.map(k => `sl-cop-${k}`), 'sl-back'];
    for (const [idx, sid] of slideIds.entries()) {
      const el = document.getElementById(sid);
      if (!el) continue;
      const prevZoom = el.style.zoom;
      el.style.zoom = 1;
      const isWhite = sid === 'sl-comp' || sid.startsWith('sl-cop-');
      const canvas = await html2canvas(el.firstElementChild, { scale: 2, useCORS: true, logging: false, backgroundColor: isWhite ? '#ffffff' : '#0A0A2E' });
      el.style.zoom = prevZoom;
      const img = canvas.toDataURL('image/jpeg', 0.95);
      if (idx > 0) pdf.addPage();
      pdf.addImage(img, 'JPEG', 0, 0, 297, 167);
    }

    const d = getData();
    const name = `cotacao_${d.empresa.replace(/[^\w]/g,'_').slice(0,25)}_${d.mesano.replace('/','_')}.pdf`;
    pdf.save(name);
  } catch(e) { alert('Erro ao gerar PDF: ' + e.message); }
  btn.disabled = false; btn.innerHTML = 'ã˜ Baixar PDF';
}

/* ããããããããããããããããããã UTILS ããããããããããããããããããã */
function fmt(v) { return 'R$ ' + (+v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
